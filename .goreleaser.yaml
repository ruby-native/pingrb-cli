version: 2

project_name: pingrb

builds:
  - binary: pingrb
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: ruby-native
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "Bump pingrb to {{ .Tag }}"
    directory: Formula
    homepage: https://pingrb.com
    description: Send yourself a push notification from anything that can shell out
    install: |
      bin.install "pingrb"
    test: |
      assert_match "pingrb", shell_output("#{bin}/pingrb --version")
